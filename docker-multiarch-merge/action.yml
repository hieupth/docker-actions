name: docker-multiarch-merge
description: Download digest artifacts and create a multi-arch manifest tag

inputs:
  registry:
    required: false
    default: docker.io
    description: Registry host for login
  username:
    required: true
    description: Registry username
  password:
    required: true
    description: Registry password/token
  image:
    required: true
    description: "Image ref WITHOUT tag. Example: docker.io/user/app"
  tag:
    required: true
    description: "Single tag to publish"
  artifact_prefix:
    required: false
    default: digests
    description: Prefix for artifact name (must match build)
  digests_path:
    required: false
    default: /tmp/digests
    description: Path to download digests
  checkout:
    required: false
    default: "true"
    description: Checkout repository (set to false if workspace already has files)

runs:
  using: composite
  steps:
    -
      name: Prepare Docker environment
      uses: hieupth/gh-docker-actions/docker-prepare@main
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        free_disk_space: false
        setup_qemu: false
        checkout: ${{ inputs.checkout }}
    -
      name: Download digest artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: ${{ inputs.artifact_prefix }}-${{ inputs.tag }}-*
        path: ${{ inputs.digests_path }}
        merge-multiple: true
    -
      name: Set GitHub Path
      run: echo "${{ github.action_path }}" >> $GITHUB_PATH
      shell: bash
    -
      name: Create and push manifest list
      run: create-manifest.sh
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_DIGESTS_PATH: ${{ inputs.digests_path }}
