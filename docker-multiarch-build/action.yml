name: docker-multiarch-build
description: Build a single-platform image, push by digest, upload digest as an artifact

inputs:
  registry:
    required: false
    default: docker.io
    description: Registry host for login
  username:
    required: true
    description: Registry username
  password:
    required: true
    description: Registry password/token
  image:
    required: true
    description: "Image ref WITHOUT tag. Example: docker.io/user/app"
  tag:
    required: true
    description: "Single tag (caller can pass matrix.tag)"
  platform:
    required: true
    description: "Single platform for this job. Example: linux/amd64"
  context:
    required: false
    default: .
  dockerfile:
    required: false
    default: Dockerfile
  build_args:
    required: false
    default: ""
  artifact_prefix:
    required: false
    default: digests
    description: Prefix for artifact name
  retention_days:
    required: false
    default: "1"
    description: Artifact retention days
  checkout:
    required: false
    default: "true"
    description: Checkout repository before build (set to false if workspace already has files)

runs:
  using: composite
  steps:
    -
      name: Prepare Docker environment
      uses: hieupth/gh-docker-actions/docker-prepare@main
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        checkout: ${{ inputs.checkout }}
    -
      name: Normalize platform tag
      id: plat
      shell: bash
      run: |
        set -euo pipefail
        plat_tag="${{ inputs.platform }}"
        plat_tag="${plat_tag//\//-}"
        echo "plat_tag=${plat_tag}" >> "$GITHUB_OUTPUT"
    - 
      name: Build and push (by digest)
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platform }}
        push: true
        build-args: ${{ inputs.build_args }}
        # Docker-recommended pattern: push-by-digest for later manifest merge
        outputs: |
          type=image,name=${{ inputs.image }},push-by-digest=true,name-canonical=true,push=true
    - 
      name: Write digest file
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p /tmp/digests
        echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ inputs.tag }}-${{ steps.plat.outputs.plat_tag }}.digest"
    - 
      name: Upload digest artifact (unique per platform)
      uses: actions/upload-artifact@v4
      with:
        # Artifact names must be unique in v4
        name: ${{ inputs.artifact_prefix }}-${{ inputs.tag }}-${{ steps.plat.outputs.plat_tag }}
        path: /tmp/digests/*.digest
        if-no-files-found: error
        retention-days: ${{ inputs.retention_days }}
