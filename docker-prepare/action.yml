name: docker-prepare
description: Prepare Docker environment (disk cleanup, QEMU, Buildx, login, checkout)

inputs:
  registry:
    required: false
    default: docker.io
    description: Registry host for login
  username:
    required: true
    description: Registry username
  password:
    required: true
    description: Registry password/token
  free_disk_space:
    required: false
    default: "true"
    description: Free disk space before build (true/false)
  setup_qemu:
    required: false
    default: "true"
    description: Setup QEMU for cross-platform builds (true/false)
  checkout:
    required: false
    default: "true"
    description: Checkout repository (true/false)

runs:
  using: composite
  steps:
    -
      name: Free Disk Space (Ubuntu)
      if: ${{ inputs.free_disk_space == 'true' }}
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    -
      name: Setup QEMU
      if: ${{ inputs.setup_qemu == 'true' }}
      uses: docker/setup-qemu-action@v3
      with:
        platforms: all
    -
      name: Setup Buildx
      uses: docker/setup-buildx-action@v3
    -
      name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
    -
      name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v4
