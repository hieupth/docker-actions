name: docker-build-push
description: Build and push a Docker image (single or multi-platform) with automatic disk cleanup

inputs:
  registry:
    required: false
    default: docker.io
    description: Registry host for login
  username:
    required: true
    description: Registry username
  password:
    required: true
    description: Registry password/token
  image:
    required: true
    description: Full image reference with tag (e.g., docker.io/user/app:latest)
  platforms:
    required: false
    default: linux/amd64
    description: Platform(s) to build (comma-separated for multi-platform, e.g., linux/amd64,linux/arm64)
  context:
    required: false
    default: .
    description: Build context path
  dockerfile:
    required: false
    default: Dockerfile
    description: Dockerfile path
  build_args:
    required: false
    default: ""
    description: Build args as newline-separated KEY=VALUE
  cache:
    required: false
    default: "true"
    description: Enable build cache (true/false)
  push:
    required: false
    default: "true"
    description: Push image to registry (true/false)
  checkout:
    required: false
    default: "true"
    description: Checkout repository before build (set to false if workspace already has files)

runs:
  using: composite
  steps:
    -
      name: Prepare Docker environment
      uses: hieupth/gh-docker-actions/docker-prepare@main
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
        checkout: ${{ inputs.checkout }}
    -
      name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.image }}
        build-args: ${{ inputs.build_args }}
        cache-from: ${{ fromJSON(inputs.cache) && 'type=gha' || '' }}
        cache-to: ${{ fromJSON(inputs.cache) && 'type=gha,mode=max' || '' }}
